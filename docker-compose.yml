services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: juno
      POSTGRES_PASSWORD: juno
      POSTGRES_DB: juno
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juno"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: ./api/.env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./worker
    env_file: ./worker/.env
    depends_on:
      db:
        condition: service_healthy
    command: python main.py

volumes:
  pgdata:
